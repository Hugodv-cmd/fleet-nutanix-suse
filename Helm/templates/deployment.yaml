apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      # Uncomment below if your GitHub Container Registry package is private
      # imagePullSecrets:
      #   - name: github-registry-credentials
      containers:
      - name: web
        image: ghcr.io/hugodv-cmd/fleet-nutanix-suse:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: HYPERVISOR
          value: {{ .Values.hypervisor | quote }}

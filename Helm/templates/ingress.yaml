apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-world-ingress
  annotations:
    # Optional: If you are using RKE2's default NGINX ingress controller
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: {{ .Values.ingressHost | quote }}  # Fleet will dynamically inject this per cluster
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hello-world-svc
            port:
              number: 80
